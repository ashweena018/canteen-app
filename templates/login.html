{% extends 'base.html' %}

{% block title %}Login — Banbwu Cafe{% endblock %}

{% block content %}

<!-- Show message if exists -->
{% if message %}
<div class="row justify-content-center mt-3">
    <div class="col-md-6 col-lg-5">
        <div class="alert alert-{{ message_type }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>
</div>
{% endif %}

<div class="row justify-content-center mt-3">
    <div class="col-md-6 col-lg-5">
        <div class="card auth-card p-4">

            <!-- Card Header -->
            <div class="text-center mb-4">
                <i class="bi bi-box-arrow-in-right text-success"
                   style="font-size: 3rem;"></i>
                <h3 class="fw-bold text-success mt-2">Welcome Back!</h3>
                <p class="text-muted">Login to Banbwu Cafe</p>
            </div>

            <!-- Login Form -->
            <form action="/login" method="POST">

                <!-- Email -->
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">
                        <i class="bi bi-envelope"></i> Email Address
                    </label>
                    <input
                        type="email"
                        class="form-control"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                        required>
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">
                        <i class="bi bi-lock"></i> Password
                    </label>
                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        required>
                </div>

                <!-- Submit -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i>
                        Login
                    </button>
                </div>

            </form>

            <!-- Link to Register -->
            <div class="text-center mt-3">
                <p class="text-muted">
                    Don't have an account?
                    <a href="/register" class="text-success fw-semibold">
                        Register here
                    </a>
                </p>
            </div>

        </div>
    </div>
</div>

{% endblock %}
