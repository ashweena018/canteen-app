{% extends 'base.html' %}
{% block title %}Register — Banbwu Cafe{% endblock %}
{% block content %}

{% if message %}
<div class="row justify-content-center mt-3">
    <div class="col-md-6 col-lg-5">
        <div class="alert alert-{{ message_type }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>
</div>
{% endif %}

<div class="row justify-content-center mt-3">
    <div class="col-md-6 col-lg-5">
        <div class="card auth-card p-4">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill text-success" style="font-size: 3rem;"></i>
                <h3 class="fw-bold text-success mt-2">Create Account</h3>
                <p class="text-muted">Join Banbwu Cafe today!</p>
            </div>
            <form action="/register" method="POST">
                <div class="mb-3">
                    <label for="full_name" class="form-label fw-semibold">
                        <i class="bi bi-person"></i> Full Name
                    </label>
                    <input type="text" class="form-control" id="full_name"
                        name="full_name" placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">
                        <i class="bi bi-envelope"></i> Email Address
                    </label>
                    <input type="email" class="form-control" id="email"
                        name="email" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">
                        <i class="bi bi-lock"></i> Password
                    </label>
                    <input type="password" class="form-control" id="password"
                        name="password" placeholder="Minimum 6 characters"
                        minlength="6" required>
                </div>
                <div class="mb-3">
                    <label for="confirm_password" class="form-label fw-semibold">
                        <i class="bi bi-lock-fill"></i> Confirm Password
                    </label>
                    <input type="password" class="form-control" id="confirm_password"
                        name="confirm_password" placeholder="Repeat your password" required>
                </div>
                <div class="mb-4">
                    <label for="role" class="form-label fw-semibold">
                        <i class="bi bi-shield"></i> Register As
                    </label>
                    <select class="form-select" id="role" name="role">
                        <option value="user">👤 Customer</option>
                        <option value="staff">👨‍🍳 Kitchen Staff</option>
                    </select>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg">
                        <i class="bi bi-person-check-fill"></i> Create Account
                    </button>
                </div>
            </form>
            <div class="text-center mt-3">
                <p class="text-muted">
                    Already have an account?
                    <a href="/login" class="text-success fw-semibold">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
{% block scripts %}
<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirm_password').value;
        if (password !== confirm) {
            e.preventDefault();
            alert('Passwords do not match! Please try again.');
            document.getElementById('confirm_password').focus();
        }
    });
</script>
{% endblock %}
